<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/OG.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Polyfill for Array.prototype.findLast and findLastIndex for older browsers
      // (Monaco Editor and some other modern libraries require these)
      if (!Array.prototype.findLast) {
        Array.prototype.findLast = function(predicate) {
          for (var i = this.length - 1; i >= 0; i--) {
            if (predicate(this[i], i, this)) return this[i];
          }
          return undefined;
        };
      }
      if (!Array.prototype.findLastIndex) {
        Array.prototype.findLastIndex = function(predicate) {
          for (var i = this.length - 1; i >= 0; i--) {
            if (predicate(this[i], i, this)) return i;
          }
          return -1;
        };
      }
    </script>
    <title>Data.OG 造数工具</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
